<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Small Multiples State Tile Cartograms</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  @font-face { font-family: "Benton"; src: url("Benton Sans/Benton Sans Book.otf"); }
  @font-face { font-family: "BentonStrong"; src: url("Benton Sans/Benton Sans Bold.otf"); }
  @font-face { font-family: "BentonMedium"; src: url("Benton Sans/Benton Sans Medium.otf"); }

  *{
    box-sizing: border-box;
  }

  body{
    margin: 0;
    padding: 16px;
    background: #fff;
    color: #111;
    font-family: "Benton", system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
  }

  #wrapper{
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
  }

  #title{
    font-family: "BentonStrong", system-ui, sans-serif;
    font-size: clamp(20px, 3vw, 24px);
    padding: 10px 0;
    border-top: 3px solid black;
    margin-bottom: 8px;
  }

  .grid{
    display: grid;
    gap: 14px;

    /* this overrides the inline JS grid-template-columns */
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)) !important;

    align-items: start;
  }

  .card{
    padding: 10px;
    background: #fff;
    min-width: 0;
  }

  .title{
    font-family: "BentonStrong", system-ui, sans-serif;
    font-size: 14px;
    letter-spacing:0px;
    margin: 0 0 6px;
  }

  .mapHost{
    width: 100%;
  }

  svg{
    display: block;
    width: 100%;
    height: auto;
    max-width: 100%;
  }

  .state text{
    text-anchor: middle;
    font-family: "Benton", system-ui, sans-serif;
    font-size: 11px;
    fill: #fff;
    letter-spacing: 0.3px;
    user-select: none;
    pointer-events: none;
  }

  .chartTitle{
    font-family: "BentonStrong", system-ui, sans-serif;
  }

  @media (max-width: 700px){
    body{
      padding: 10px;
    }

    .grid{
      gap: 10px;
      grid-template-columns: 1fr !important;
    }

    .card{
      padding: 6px;
    }
  }
</style>
</head>

<body>
<div id="wrapper">
  <div id="title">Primaries</div>

  <div id="controls"></div>
  <div id="app"></div>
</div>

<!-- Classic Bostock-style state tile layout -->
<script id="grid" type="text/plain">
                              ME
               WI          VT NH
WA ID MT ND MN IL MI    NY MA
OR NV WY SD IA IN OH PA NJ CT RI
CA UT CO NE MO KY WV VA MD DE
   AZ NM KS AR TN NC SC
         OK LA MS AL GA
HI AK    TX             FL
</script>

<script>
/* =========================================================
   CONFIG
========================================================= */
const CONFIG = {
  numMaps: 6,
  columns: 3,

  tileSize: 20,
  tileGapFactor: 1.2,
  cornerRadiusFactor: 0,

  normalFill: "#B0B0B0",
  highlightFill: "#ED1C24",
  stroke: "rgba(0,0,0,.18)",
  strokeWidth: 1,

  maps: [
    { title: "March", highlights: ["TX","NC","AR"] },
    { title: "April", highlights: ["CA","NY","IL","NJ","MA"] },
    { title: "May", highlights: ["WA","OR","CA","NV","AZ"] },
    { title: "June", highlights: ["MI","WI","MN","PA","OH"] },
    { title: "July", highlights: ["CO","NM","UT","ID","MT"] },
    { title: "August", highlights: ["FL","GA","SC","NC","VA"] }
  ]
};
/* ======================================================= */

function parseStateGridText(gridText){
  const states = [];
  gridText.split("\n").forEach((line, i) => {
    const re = /\w+/g;
    let m;
    while ((m = re.exec(line))) {
      states.push({ name: m[0], x: m.index / 3, y: i });
    }
  });
  return states;
}

function sanitizeAbbrList(arr){
  if (!arr) return [];
  return arr
    .map(s => String(s).toUpperCase().trim())
    .filter(Boolean)
    .filter(s => s.length === 2);
}

function parseHighlightsString(str){
  return sanitizeAbbrList(
    String(str || "")
      .split(",")
      .map(s => s.trim())
  );
}

function ensureMapsLength(){
  const n = Math.max(1, Math.min(24, Math.round(CONFIG.numMaps || 1)));
  while (CONFIG.maps.length < n) {
    CONFIG.maps.push({
      title: `Map ${CONFIG.maps.length + 1}`,
      highlights: []
    });
  }
  if (CONFIG.maps.length > n) {
    CONFIG.maps = CONFIG.maps.slice(0, n);
  }
}

const GRID_STATES = parseStateGridText(document.getElementById("grid").textContent);

function renderControls(){
  ensureMapsLength();

  const controls = d3.select("#controls").html("");

  const panel = controls.append("div")
    .attr("class", "controlsPanel");

  panel.append("div")
    .attr("class", "controlsHeader")
    .text("Map settings");

  const grid = panel.append("div")
    .attr("class", "mapsEditor");

  const rows = grid.selectAll(".mapRow")
    .data(CONFIG.maps)
    .enter()
    .append("div")
    .attr("class", "mapRow");

  rows.append("div")
    .attr("class", "mapRowLabel")
    .text((d, i) => `Map ${i + 1}`);

  rows.append("input")
    .attr("class", "mapTitleInput")
    .attr("type", "text")
    .attr("placeholder", "Title")
    .property("value", d => d.title || "")
    .on("input", function(event, d){
      d.title = this.value;
      build();
    });

  rows.append("input")
    .attr("class", "mapHighlightsInput")
    .attr("type", "text")
    .attr("placeholder", "TX, NC, AR")
    .property("value", d => (d.highlights || []).join(", "))
    .on("input", function(event, d){
      d.highlights = parseHighlightsString(this.value);
      build();
    });
}

function build(){
  ensureMapsLength();

  const numMaps = Math.max(1, Math.min(24, Math.round(CONFIG.numMaps || 1)));
  const cols = Math.max(1, Math.min(8, Math.round(CONFIG.columns || 1)));

  const models = Array.from({length: numMaps}, (_, i) => {
    const src = CONFIG.maps && CONFIG.maps[i] ? CONFIG.maps[i] : {};
    return {
      title: src.title ?? `Map ${i+1}`,
      highlights: new Set(sanitizeAbbrList(src.highlights))
    };
  });

  const app = d3.select("#app").html("");

  app.append("div")
    .attr("class", "grid")
    .style("grid-template-columns", `repeat(${cols}, minmax(0, 1fr))`)
    .each(function(){
      const grid = d3.select(this);

      const cards = grid.selectAll(".card")
        .data(models)
        .enter()
        .append("div")
        .attr("class", "card");

      cards.append("div")
        .attr("class", "mapHost")
        .each(function(d, i){
          drawMap(this, d, i, d.title);
        });
    });
}

function drawMap(hostEl, model, index, title){
  const tileSize = clampInt(CONFIG.tileSize, 16, 60);
  const cellSize = Math.round(tileSize * (Number(CONFIG.tileGapFactor) || 1.12));
  const tileW = tileSize;
  const tileH = tileSize;

  const gridWidth = d3.max(GRID_STATES, d => d.x) + 1;
  const gridHeight = d3.max(GRID_STATES, d => d.y) + 1;

  const w = Math.round(gridWidth * cellSize + cellSize);
  const h = Math.round(gridHeight * cellSize + cellSize);

  const rx = 0;
  const normalFill = CONFIG.normalFill || "#3995B2";
  const highlightFill = CONFIG.highlightFill || "#FFCF01";

  const svg = d3.select(hostEl)
    .append("svg")
    .attr("viewBox", `0 0 ${w} ${h}`);

  svg.append("text")
    .text(title)
    .attr("x", 0)
    .attr("y", 30)
    .attr("class", "chartTitle");

  const g = svg.append("g")
    .attr("transform", `translate(${w/2},${h/2})`);

  const state = g.selectAll(".state")
    .data(GRID_STATES)
    .enter()
    .append("g")
    .attr("class", "state")
    .attr("transform", d =>
      `translate(${(d.x - gridWidth/2) * cellSize}, ${(d.y - gridHeight/2) * cellSize})`
    );

  state.append("rect")
    .attr("x", -tileW/2)
    .attr("y", -tileH/2)
    .attr("width", tileW)
    .attr("height", tileH)
    .attr("rx", rx)
    .attr("ry", rx)
    .attr("stroke", CONFIG.stroke || "rgba(0,0,0,.18)")
    .attr("stroke-width", Number(CONFIG.strokeWidth ?? 1))
    .attr("fill", d => model.highlights.has(d.name) ? highlightFill : normalFill);

  state.append("text")
    .attr("dy", ".35em")
    .text(d => d.name);
}

function clampInt(n, min, max){
  n = Math.round(Number(n));
  if (!Number.isFinite(n)) n = min;
  return Math.max(min, Math.min(max, n));
}

renderControls();
build();
</script>
</body>
</html>
