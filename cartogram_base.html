<body>
    <div style="margin-bottom:15px;">
Generate a chart image<br><br>

<label>Chart title:</label>
<input id="titleInput" type="text" placeholder="State Legislative Seats Up in 2026" style="width:300px;">
<br><br>
<label>Highlighted states (comma separated):</label>
<input id="highlightInput" type="text" placeholder="TX,NC,AR" style="width:200px;">


</div>

<h2 id="chartTitle"></h2>
<div id="wrapper">
<div id="title">Tk</div>

</div>
<script id="grid" type="text/plain">
                              ME
               WI          VT NH

   AZ NM KS AR TN NC SC
         OK LA MS AL GA

<script>

const blue = "#3995B2"
let HIGHLIGHT_STATES = ["TX", "NC", "AR","NJ"]; // <-- put any state abbreviations here
const highlightFill = "#ED1C24";             // highlighted tile color
const normalFill = "#B0B0B0";                // default tile color

HIGHLIGHT_STATES = []

Promise.all([
  d3.csv("midterm election 2026 general - seats.csv")
]).then(function(data){

  const seatsData = data[0]
  const seatsDict = seatsDictionary(seatsData)

drawGrid(seatsDict)
drawLegend()

document.getElementById("highlightInput")
.addEventListener("input", function(){

  const value = this.value.trim()

  if(value === ""){
    HIGHLIGHT_STATES = []
  } else {
    HIGHLIGHT_STATES = value
      .toUpperCase()
      .split(",")
      .map(d => d.trim())
  }

  updateHighlights()

})


document.getElementById("titleInput")
.addEventListener("input", function(){

  d3.select("#title")
    .text(this.value)

})
})
function updateHighlights(){

  d3.selectAll(".state rect")
    .attr("fill", d => 
      HIGHLIGHT_STATES.includes(d.name)
      ? highlightFill
      : normalFill
    )

}
function drawLegend(){

  const legend = d3.select("#map svg")
    .append("g")
    .attr("transform","translate(50,10)");

//   legend.append("rect")
//     .attr("width",140)
//     .attr("height",80)
//     .attr("fill","none")
//     .attr("stroke","black")
//     .attr("stroke-width","2px")

     legend.append("text")
    .attr("x",4)
    .attr("y",20)
    .style("fill","black")
    .attr("font-size",14)
    .text("LEGEND");
const legendText = legend.append("g")
    .attr("transform","translate(0,20)");

  // numerator
  legendText.append("text")
    .attr("x",15)
    .attr("y",20)
    .style("fill","black")
    .attr("font-size",14)
        .attr("text-anchor","middle")
.text("3");

  // divider
  legendText.append("text")
    .attr("x",15)
    .attr("y",32)
    .style("fill","black")
        .attr("text-anchor","middle")
.text("—");

  // denominator
  legendText.append("text")
    .attr("x",15)
    .attr("y",46)
    .style("fill","black")
    .attr("text-anchor","middle")
    .attr("font-size",14)
    .text("36");

  legendText.append("text")
    .attr("x",35)
    .attr("y",20)
    .style("fill","black")
    .attr("font-size",11)
    .text("House seats up in 2026");

  legendText.append("text")
    .attr("x",35)
    .attr("y",44)
    .style("fill","black")
    .attr("font-size",11)
    .text("out of total seats");

}

function seatsDictionary(seatsData){

  const dict = {}

  seatsData.forEach(function(d){
    const abbr = state_abbr[d.State]
    dict[abbr] = d
  })

  return dict
}




function drawGrid(seats){

  const states = []

  d3.select("#grid")
  .text()
  .split("\n")
  .forEach(function(line,i){

    const re = /\w+/g
    let m

    while(m = re.exec(line)){
      states.push({
        name:m[0],
        x:m.index/3,
        y:i
      })
    }

  })


  const width = 500
  const height = 400

  const svg = d3.select("#map")
  .append("svg")
  .attr("width",width)
  .attr("height",height)


  const gridWidth = d3.max(states,d=>d.x)+1
  const gridHeight = d3.max(states,d=>d.y)+1


  const cellSize = 40
  const tileW = 35
  const tileH = 45
  const gap = 2


  const g = svg.append("g")
  .attr("transform","translate("+width/2+","+height/2+")")


  const state = g.selectAll(".state")
  .data(states)
  .enter()
  .append("g")
  .attr("class","state")
  .attr("transform",d =>
      "translate(" +
      (d.x-gridWidth/2)*(tileW+gap)+ "," +
      (d.y-gridHeight/2)*(tileH+gap) +
      ")"
  )


state.append("rect")
//   .attr("x",-tileW/2)
  .attr("x",0)
  .attr("y",-tileH/2)
  .attr("width",tileW)
  .attr("height",tileH)
  .attr("rx",2)
  .attr("fill", d => HIGHLIGHT_STATES.includes(d.name) ? highlightFill : normalFill)



  state.append("text")
  .attr("class","abbr")
    .attr("x",tileW/2)

  .attr("y",-8)
  .text(d=>d.name)


const house = state.append("g")
  .attr("class","metric")
  .attr("transform","translate("+tileW/2+",6)");

house.append("text")
  .attr("y",-1)
  .text(d => {
    if(d.name=="NE"){
    return "";

    }
    const row = seats[d.name];
    return row ? row["House Seats up in 2026"] : "";
  });

house.append("text")
  .attr("y",5)
  .text("—");

house.append("text")
  .attr("y",12)
  .text(d => {

    if(d.name=="NE"){
    return "";

    }
    const row = seats[d.name];
    return row ? row["Total House Seats"] : "";
  });

  


//   state.append("text")
//   .attr("class","metric")
//   .attr("y",16)
//   .text(function(d){

//     const row = seats[d.name]
//     if(!row) return ""

//     return "S: "+row["Senate Seats up in 2026"]+"/"+row["Total Senate Seats"]

//   })



  state.on("mouseover",function(e,d){

    // d3.selectAll("rect")
    // .style("stroke-width",0)

    // d3.select(this)
    // .select("rect")
    // .style("stroke","black")
    // .style("stroke-width",2)

  })

  .on("mouseout",function(){

    // d3.select(this)
    // .select("rect")
    // .style("stroke-width",0)

  })


}

</script>

</body>
</html>
